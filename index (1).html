<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TP Discrepancy Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f11;
  --surface:#18181c;
  --border:#2a2a30;
  --border-light:#38383f;
  --text:#f0f0f2;
  --muted:#7a7a88;
  --clean:#22c55e;
  --clean-bg:#052011;
  --clean-border:#0d4023;
  --approved:#3b82f6;
  --approved-bg:#071528;
  --approved-border:#102850;
  --review:#f97316;
  --review-bg:#1a0d04;
  --review-border:#3a1f08;
  --refresh:#eab308;
  --refresh-bg:#181200;
  --refresh-border:#352900;
  --font-head:'Syne',sans-serif;
  --font-mono:'DM Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-head);min-height:100vh;}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 32px;border-bottom:1px solid var(--border);
  background:var(--surface);position:sticky;top:0;z-index:100;
}
.topbar-left{display:flex;align-items:center;gap:16px;}
.logo{font-size:15px;font-weight:700;letter-spacing:0.04em;color:var(--text);}
.logo span{color:var(--muted);font-weight:400;}
.badge-date{font-family:var(--font-mono);font-size:11px;color:var(--muted);background:var(--border);padding:4px 10px;border-radius:4px;}
.upload-btn{
  font-family:var(--font-head);font-size:12px;font-weight:600;
  background:transparent;border:1px solid var(--border-light);color:var(--muted);
  padding:7px 16px;border-radius:6px;cursor:pointer;letter-spacing:0.04em;
  transition:all 0.15s;
}
.upload-btn:hover{border-color:var(--text);color:var(--text);}

.main{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 57px);}

.sidebar{
  border-right:1px solid var(--border);padding:24px 0;
  background:var(--surface);overflow-y:auto;max-height:calc(100vh - 57px);
  position:sticky;top:57px;
}
.sidebar-label{
  font-family:var(--font-mono);font-size:10px;color:var(--muted);
  letter-spacing:0.1em;text-transform:uppercase;padding:0 20px;margin-bottom:10px;
}
.po-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;cursor:pointer;transition:background 0.1s;
  border-left:2px solid transparent;
}
.po-item:hover{background:rgba(255,255,255,0.03);}
.po-item.active{background:rgba(255,255,255,0.05);border-left-color:var(--text);}
.po-num{font-family:var(--font-mono);font-size:12px;color:var(--text);}
.po-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.po-dot.clean{background:var(--clean);}
.po-dot.auto_approved{background:var(--approved);}
.po-dot.needs_review{background:var(--review);}
.po-dot.tp_refresh{background:var(--refresh);}
.po-lines{font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:2px;}

.content{padding:32px;overflow-y:auto;}

.stats-grid{
  display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:32px;
}
.stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:16px;
}
.stat-label{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;}
.stat-val{font-size:28px;font-weight:700;letter-spacing:-0.02em;line-height:1;}
.stat-val.total{color:var(--text);}
.stat-val.lines{color:var(--muted);}
.stat-val.clean{color:var(--clean);}
.stat-val.approved{color:var(--approved);}
.stat-val.review{color:var(--review);}
.stat-val.refresh{color:var(--refresh);}

.section-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.section-title{font-size:13px;font-weight:600;letter-spacing:0.04em;color:var(--text);}
.section-count{font-family:var(--font-mono);font-size:11px;color:var(--muted);}

.po-detail-header{
  display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap;
}
.po-detail-num{font-size:22px;font-weight:700;letter-spacing:-0.01em;}
.status-pill{
  font-family:var(--font-mono);font-size:10px;font-weight:500;letter-spacing:0.08em;
  text-transform:uppercase;padding:4px 10px;border-radius:4px;
}
.pill-clean{background:var(--clean-bg);color:var(--clean);border:1px solid var(--clean-border);}
.pill-auto_approved{background:var(--approved-bg);color:var(--approved);border:1px solid var(--approved-border);}
.pill-needs_review{background:var(--review-bg);color:var(--review);border:1px solid var(--review-border);}
.pill-tp_refresh{background:var(--refresh-bg);color:var(--refresh);border:1px solid var(--refresh-border);}

.lines-table{width:100%;border-collapse:collapse;font-size:12px;}
.lines-table th{
  font-family:var(--font-mono);font-size:10px;font-weight:500;color:var(--muted);
  letter-spacing:0.06em;text-transform:uppercase;
  padding:8px 12px;border-bottom:1px solid var(--border);text-align:left;
}
.lines-table td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.lines-table tr:last-child td{border-bottom:none;}
.lines-table tr:hover td{background:rgba(255,255,255,0.02);}
.mono{font-family:var(--font-mono);}
.sku-cell{font-family:var(--font-mono);font-size:11px;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.desc-cell{font-size:12px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);}
.price-cell{font-family:var(--font-mono);font-size:12px;text-align:right;}
.invoice-cell{font-family:var(--font-mono);font-size:12px;font-weight:500;text-align:right;}
.status-cell{text-align:center;}
.line-status{
  display:inline-block;font-family:var(--font-mono);font-size:9px;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;padding:3px 8px;border-radius:3px;
  white-space:nowrap;
}
.ls-clean{background:var(--clean-bg);color:var(--clean);}
.ls-auto_approved{background:var(--approved-bg);color:var(--approved);}
.ls-needs_review{background:var(--review-bg);color:var(--review);}
.ls-tp_refresh{background:var(--refresh-bg);color:var(--refresh);}

.review-card{
  background:var(--surface);border:1px solid var(--review-border);
  border-radius:8px;padding:20px;margin-bottom:12px;
}
.review-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;}
.review-card-sku{font-family:var(--font-mono);font-size:13px;font-weight:500;color:var(--text);}
.review-card-desc{font-size:12px;color:var(--muted);margin-top:3px;}
.review-card-prices{display:flex;gap:20px;margin-bottom:14px;}
.price-block label{font-family:var(--font-mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:4px;}
.price-block .val{font-family:var(--font-mono);font-size:18px;font-weight:500;}
.price-block .val.actual{color:var(--text);}
.price-block .val.popo{color:var(--review);}
.price-block .val.diff-small{color:var(--refresh);}
.review-actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn{
  font-family:var(--font-head);font-size:11px;font-weight:600;letter-spacing:0.04em;
  padding:7px 14px;border-radius:5px;cursor:pointer;border:1px solid;
  transition:all 0.15s;
}
.btn-approve{background:var(--approved-bg);color:var(--approved);border-color:var(--approved-border);}
.btn-approve:hover{background:rgba(59,130,246,0.2);}
.btn-flag{background:var(--refresh-bg);color:var(--refresh);border-color:var(--refresh-border);}
.btn-flag:hover{background:rgba(234,179,8,0.15);}
.btn-refresh{background:var(--surface);color:var(--muted);border-color:var(--border);}
.btn-refresh:hover{border-color:var(--border-light);color:var(--text);}
.btn-done{background:var(--clean-bg);color:var(--clean);border-color:var(--clean-border);cursor:default;}
.escalated-note{
  font-family:var(--font-mono);font-size:10px;color:var(--refresh);
  background:var(--refresh-bg);border:1px solid var(--refresh-border);
  padding:6px 10px;border-radius:4px;margin-bottom:12px;
}
.all-view{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}

.export-bar{display:flex;justify-content:flex-end;margin-bottom:16px;}
.export-btn{
  font-family:var(--font-head);font-size:11px;font-weight:600;letter-spacing:0.06em;
  text-transform:uppercase;background:transparent;border:1px solid var(--border-light);
  color:var(--muted);padding:7px 16px;border-radius:5px;cursor:pointer;transition:all 0.15s;
}
.export-btn:hover{color:var(--text);border-color:var(--text);}

@media(max-width:900px){
  .main{grid-template-columns:1fr;}
  .sidebar{position:static;max-height:none;display:flex;flex-wrap:wrap;gap:4px;padding:12px;}
  .stats-grid{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>

lver, 6 Spoons and 6 Forks) 12.0 pieces", "actual": 197.61, "po_tp": 197.63, "invoice_at": 197.63, "diff": 0.01999999999998181, "pct": 0.010120945296281467, "qty": 40, "po_val": 9328.0, "status": "auto_approved", "reason": "Diff < \u20b91 \u2014 invoice at 197.63", "escalated": false}]};
let decisions = {};
let activePO = null;

const PO_LIST = RAW.po_list;
const ALL_LINES = RAW.lines;

function statusLabel(s){
  const m={clean:'Clean',auto_approved:'Auto-approved',needs_review:'Needs review',tp_refresh:'Refresh with platform'};
  return m[s]||s;
}
function pillClass(s){return 'pill-'+s;}
function lsClass(s){return 'ls-'+s;}

function showOverview(){
  activePO = null;
  document.getElementById('all-pos-btn').style.borderLeftColor = 'var(--text)';
  document.getElementById('all-pos-btn').style.background = 'rgba(255,255,255,.05)';
  buildNav();
  const review   = PO_LIST.filter(p=>p.overall==='needs_review');
  const refresh  = PO_LIST.filter(p=>p.overall==='tp_refresh');
  const approved = PO_LIST.filter(p=>p.overall==='auto_approved');
  const clean    = PO_LIST.filter(p=>p.overall==='clean');
  function poGrid(list){
    return `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:22px;">${list.map(p=>`
      <div onclick="selectPO('${p.po}')" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:border-color .15s;" onmouseover="this.style.borderColor='var(--border-light)'" onmouseout="this.style.borderColor='var(--border)'">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
          <div style="font-family:var(--fm);font-size:12px;font-weight:500;">${p.po}</div>
          <div class="dot ${p.overall}"></div>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:8px;">${p.city||''}  ·  ${p.total} line${p.total>1?'s':''}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${p.needs_review?`<span class="ls ls-needs_review">${p.needs_review} review</span>`:''}
          ${p.tp_refresh?`<span class="ls ls-tp_refresh">${p.tp_refresh} refresh</span>`:''}
          ${p.auto_approved?`<span class="ls ls-auto_approved">${p.auto_approved} approved</span>`:''}
          ${p.clean?`<span class="ls ls-clean">${p.clean} clean</span>`:''}
        </div>
      </div>`).join('')}</div>`;
  }
  let h = '';
  if(review.length){ h += `<div class="sec-hd"><div class="sec-title">Needs review</div><div class="sec-count">${review.length} PO${review.length>1?'s':''}</div></div>${poGrid(review)}`; }
  if(refresh.length){ h += `<div class="sec-hd"><div class="sec-title">Refresh with platform</div><div class="sec-count">${refresh.length} PO${refresh.length>1?'s':''}</div></div>${poGrid(refresh)}`; }
  if(approved.length){ h += `<div class="sec-hd"><div class="sec-title">Auto-approved</div><div class="sec-count">${approved.length} PO${approved.length>1?'s':''}</div></div>${poGrid(approved)}`; }
  if(clean.length){ h += `<div class="sec-hd"><div class="sec-title">Clean</div><div class="sec-count">${clean.length} PO${clean.length>1?'s':''}</div></div>${poGrid(clean)}`; }
  document.getElementById('detail').innerHTML = h;
}

function buildNav(){
  const nav = document.getElementById('po-nav');
  nav.innerHTML = PO_LIST.map(p=>`
    <div class="po-item ${activePO===p.po?'active':''}" onclick="selectPO('${p.po}')">
      <div>
        <div class="po-num">${p.po}</div>
        <div class="po-lines">${p.total} line${p.total>1?'s':''}</div>
      </div>
      <div class="po-dot ${p.overall}"></div>
    </div>
  `).join('');
}

function selectPO(po){
  activePO = po;
  buildNav();
  const poData = PO_LIST.find(p=>p.po===po);
  renderDetail(poData);
}

function renderDetail(poData){
  const pane = document.getElementById('detail-pane');
  const needsReview = poData.lines.filter(l=>l.status==='needs_review');
  const autoApproved = poData.lines.filter(l=>l.status==='auto_approved');
  const clean = poData.lines.filter(l=>l.status==='clean');
  const refresh = poData.lines.filter(l=>l.status==='tp_refresh');

  let html = `
    <div class="po-detail-header">
      <div class="po-detail-num">${poData.po}</div>
      <div class="status-pill ${pillClass(poData.overall)}">${statusLabel(poData.overall)}</div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-left:auto;">${poData.total} lines</div>
    </div>
    <div class="export-bar"><button class="export-btn" onclick="exportPO('${poData.po}')">↓ Export this PO</button></div>
  `;

  if(needsReview.length){
    html += `<div class="section-head"><div class="section-title">Needs your decision</div><div class="section-count">${needsReview.length} line${needsReview.length>1?'s':''}</div></div>`;
    needsReview.forEach((l,i)=>{
      const key = poData.po+'__'+l.sku;
      const dec = decisions[key];
      const higher = Math.max(l.actual||0, l.po_tp||0);
      html += `<div class="review-card">
        <div class="review-card-head">
          <div>
            <div class="review-card-sku">${l.sku}</div>
            <div class="review-card-desc">${l.desc.substring(0,80)}</div>
          </div>
          ${l.escalated?'<div class="status-pill pill-tp_refresh">Escalated</div>':''}
        </div>
        ${l.escalated?`<div class="escalated-note">Qualifies for ₹1 rule individually, but escalated — another line in this PO has a large discrepancy.</div>`:''}
        <div class="review-card-prices">
          <div class="price-block"><label>Actual TP</label><div class="val actual">₹${(l.actual||0).toFixed(2)}</div></div>
          <div class="price-block"><label>PO TP</label><div class="val popo">₹${(l.po_tp||0).toFixed(2)}</div></div>
          <div class="price-block"><label>Diff</label><div class="val diff-small">₹${(l.diff||0).toFixed(2)}</div></div>
          ${dec?`<div class="price-block"><label>Invoice at</label><div class="val actual">${dec.invoiceAt?'₹'+dec.invoiceAt.toFixed(2):'—'}</div></div>`:''}
        </div>
        <div class="review-actions">
          ${dec
            ?`<button class="btn btn-done">✓ ${dec.label}${dec.sending?' · syncing…':dec.error?' · sync failed':dec.synced?' · synced':''}</button>`
            :`<button class="btn btn-approve" onclick="decide('${key}','approve',${higher},'Approved @ ₹${higher.toFixed(2)}')">Approve — invoice at ₹${higher.toFixed(2)}</button>
              <button class="btn btn-flag" onclick="decide('${key}','flag',null,'Flagged to platform')">Flag platform</button>
              <button class="btn btn-refresh" onclick="decide('${key}','refresh',null,'TP refresh')">TP refresh</button>`
          }
        </div>
      </div>`;
    });
    html += '<div style="margin-bottom:24px;"></div>';
  }

  if(refresh.length){
    html += `<div class="section-head"><div class="section-title">Refresh with platform</div><div class="section-count">${refresh.length} line${refresh.length>1?'s':''}</div></div>`;
    html += `<div class="all-view"><table class="lines-table">${tableHead()}${refresh.map(l=>tableRow(l)).join('')}</table></div>`;
    html += '<div style="margin-bottom:24px;"></div>';
  }

  if(autoApproved.length){
    html += `<div class="section-head"><div class="section-title">Auto-approved — send to invoicing</div><div class="section-count">${autoApproved.length} line${autoApproved.length>1?'s':''}</div></div>`;
    html += `<div class="all-view"><table class="lines-table">${tableHead()}${autoApproved.map(l=>tableRow(l)).join('')}</table></div>`;
    html += '<div style="margin-bottom:24px;"></div>';
  }

  if(clean.length){
    html += `<div class="section-head"><div class="section-title">Clean — send to invoicing</div><div class="section-count">${clean.length} line${clean.length>1?'s':''}</div></div>`;
    html += `<div class="all-view"><table class="lines-table">${tableHead()}${clean.map(l=>tableRow(l)).join('')}</table></div>`;
  }

  pane.innerHTML = html;
  updateHeaderStats();
}

function tableHead(){
  return `<thead><tr>
    <th>SKU</th><th>Description</th><th style="text-align:right">Actual TP</th>
    <th style="text-align:right">PO TP</th><th style="text-align:right">Invoice at</th>
    <th style="text-align:center">Status</th><th>Reason</th>
  </tr></thead>`;
}
function tableRow(l){
  const inv = l.invoice_at!=null?'₹'+l.invoice_at.toFixed(2):'—';
  const invColor = l.invoice_at!=null?'color:var(--clean)':'color:var(--muted)';
  return `<tr>
    <td class="sku-cell" title="${l.sku}">${l.sku}</td>
    <td class="desc-cell" title="${l.desc}">${l.desc.substring(0,55)}…</td>
    <td class="price-cell">₹${(l.actual||0).toFixed(2)}</td>
    <td class="price-cell">₹${(l.po_tp||0).toFixed(2)}</td>
    <td class="invoice-cell" style="${invColor}">${inv}</td>
    <td class="status-cell"><span class="line-status ${lsClass(l.status)}">${statusLabel(l.status)}</span></td>
    <td style="font-family:var(--font-mono);font-size:10px;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${l.reason}">${l.reason}</td>
  </tr>`;
}

function decide(key, action, invoiceAt, label){
  decisions[key] = {action, invoiceAt, label};
  const poData = PO_LIST.find(p=>p.po===activePO);
  renderDetail(poData);
  updateHeaderStats();
}

function updateHeaderStats(){
  const pending = ALL_LINES.filter(l=>l.status==='needs_review').filter(l=>{
    const key = l.po+'__'+l.sku;
    return !decisions[key];
  }).length;
  document.getElementById('h-review').textContent = pending;
}

function exportCSV(){
  const rows=[['PO #','SKU','Description','Actual TP','PO TP','Diff','Status','Invoice at','Reason']];
  ALL_LINES.forEach(l=>{
    const key=l.po+'__'+l.sku;
    const dec=decisions[key];
    let status = l.status;
    let inv = l.invoice_at!=null?l.invoice_at.toFixed(2):'—';
    if(dec){status='decided:'+dec.action;if(dec.invoiceAt)inv=dec.invoiceAt.toFixed(2);}
    rows.push([l.po,l.sku,l.desc,(l.actual||0).toFixed(2),(l.po_tp||0).toFixed(2),(l.diff||0).toFixed(2),status,inv,l.reason]);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='tp_decisions_may2026.csv';a.click();
}

function exportPO(po){
  const lines=ALL_LINES.filter(l=>l.po===po);
  const rows=[['PO #','SKU','Description','Actual TP','PO TP','Diff','Status','Invoice at','Reason']];
  lines.forEach(l=>{
    const key=l.po+'__'+l.sku;
    const dec=decisions[key];
    let status=l.status;
    let inv=l.invoice_at!=null?l.invoice_at.toFixed(2):'—';
    if(dec){status='decided:'+dec.action;if(dec.invoiceAt)inv=dec.invoiceAt.toFixed(2);}
    rows.push([l.po,l.sku,l.desc,(l.actual||0).toFixed(2),(l.po_tp||0).toFixed(2),(l.diff||0).toFixed(2),status,inv,l.reason]);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download=`tp_${po}.csv`;a.click();
}

buildNav();
selectPO(PO_LIST.find(p=>p.overall==='needs_review')?.po || PO_LIST[0].po);
</script>
