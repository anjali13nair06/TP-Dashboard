<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TP Dashboard · May 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f11;--surface:#18181c;--border:#2a2a30;--border-light:#38383f;
  --text:#f0f0f2;--muted:#7a7a88;
  --clean:#22c55e;--clean-bg:#052011;--clean-bd:#0d4023;
  --approved:#3b82f6;--approved-bg:#071528;--approved-bd:#102850;
  --review:#f97316;--review-bg:#1a0d04;--review-bd:#3a1f08;
  --refresh:#eab308;--refresh-bg:#181200;--refresh-bd:#352900;
  --fh:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--fh);min-height:100vh;font-size:14px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;gap:12px;flex-wrap:wrap;}
.logo{font-size:14px;font-weight:600;letter-spacing:.01em;}
.logo span{color:var(--muted);font-weight:400;}
.meta{font-family:var(--fm);font-size:11px;color:var(--muted);background:var(--border);padding:4px 10px;border-radius:4px;white-space:nowrap;}
.tbtn{font-family:var(--fh);font-size:11px;font-weight:500;letter-spacing:.03em;text-transform:uppercase;background:transparent;border:1px solid var(--border-light);color:var(--muted);padding:6px 14px;border-radius:5px;cursor:pointer;transition:all .15s;}
.tbtn:hover{color:var(--text);border-color:var(--text);}
.main{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 53px);}
.sidebar{border-right:1px solid var(--border);background:var(--surface);overflow-y:auto;max-height:calc(100vh - 53px);position:sticky;top:53px;display:flex;flex-direction:column;}
.sidebar-label{font-family:var(--fm);font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:16px 18px 8px;}
.overview-btn{display:flex;align-items:center;gap:8px;padding:10px 18px;cursor:pointer;border-left:2px solid transparent;border-bottom:1px solid var(--border);transition:background .1s;}
.overview-btn:hover{background:rgba(255,255,255,.03);}
.overview-btn.active{background:rgba(255,255,255,.05);border-left-color:var(--text);}
.overview-btn-label{font-family:var(--fm);font-size:12px;color:var(--muted);}
.po-item{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;cursor:pointer;border-left:2px solid transparent;transition:background .1s;gap:8px;}
.po-item:hover{background:rgba(255,255,255,.03);}
.po-item.active{background:rgba(255,255,255,.05);border-left-color:var(--text);}
.po-num{font-family:var(--fm);font-size:12px;}
.po-sub{font-family:var(--fm);font-size:10px;color:var(--muted);margin-top:2px;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot.clean{background:var(--clean);}.dot.auto_approved{background:var(--approved);}.dot.needs_review{background:var(--review);}.dot.tp_refresh{background:var(--refresh);}
.legend{display:flex;gap:12px;flex-wrap:wrap;padding:14px 18px;border-top:1px solid var(--border);margin-top:auto;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.leg-dot{width:7px;height:7px;border-radius:50%;}
.content{padding:24px;overflow-y:auto;}
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:24px;}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;}
.sc-label{font-family:var(--fm);font-size:10px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;}
.sc-val{font-size:24px;font-weight:600;line-height:1;}
.v-total{color:var(--text);}.v-lines{color:var(--muted);}.v-clean{color:var(--clean);}.v-approved{color:var(--approved);}.v-review{color:var(--review);}.v-refresh{color:var(--refresh);}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;margin-top:4px;}
.sec-title{font-size:13px;font-weight:500;}
.sec-count{font-family:var(--fm);font-size:11px;color:var(--muted);}
.po-hd{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.po-hd-num{font-size:18px;font-weight:600;}
.pill{font-family:var(--fm);font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:4px;}
.pill-clean{background:var(--clean-bg);color:var(--clean);border:1px solid var(--clean-bd);}
.pill-auto_approved{background:var(--approved-bg);color:var(--approved);border:1px solid var(--approved-bd);}
.pill-needs_review{background:var(--review-bg);color:var(--review);border:1px solid var(--review-bd);}
.pill-tp_refresh{background:var(--refresh-bg);color:var(--refresh);border:1px solid var(--refresh-bd);}
.card{background:var(--surface);border:1px solid var(--review-bd);border-radius:8px;padding:18px;margin-bottom:10px;}
.card-sku{font-family:var(--fm);font-size:13px;font-weight:500;}
.card-desc{font-size:12px;color:var(--muted);margin-top:3px;}
.card-prices{display:flex;gap:20px;margin:12px 0;}
.pb label{font-family:var(--fm);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:3px;}
.pb .v{font-family:var(--fm);font-size:17px;font-weight:500;}
.v-actual{color:var(--text);}.v-popo{color:var(--review);}.v-diffsm{color:var(--refresh);}
.esc-note{font-family:var(--fm);font-size:10px;color:var(--refresh);background:var(--refresh-bg);border:1px solid var(--refresh-bd);padding:5px 9px;border-radius:4px;margin-bottom:10px;}
.actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn{font-family:var(--fh);font-size:12px;font-weight:500;padding:8px 16px;border-radius:6px;cursor:pointer;border:1px solid;transition:all .15s;}
.btn-approve{background:var(--approved);color:#fff;border-color:var(--approved);}
.btn-approve:hover{background:#2563eb;border-color:#2563eb;}
.btn-flag{background:var(--refresh);color:#000;border-color:var(--refresh);}
.btn-flag:hover{background:#ca8a04;border-color:#ca8a04;}
.btn-neutral{background:var(--border);color:var(--text);border-color:var(--border-light);}
.btn-neutral:hover{background:var(--border-light);}
.btn-done{background:var(--clean-bg);color:var(--clean);border-color:var(--clean-bd);cursor:default;font-size:12px;}
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;overflow-x:auto;margin-bottom:22px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{font-family:var(--fm);font-size:10px;font-weight:500;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;padding:8px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.sku-td{font-family:var(--fm);font-size:11px;color:var(--muted);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.desc-td{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);}
.price-td{font-family:var(--fm);font-size:12px;text-align:right;white-space:nowrap;}
.inv-td{font-family:var(--fm);font-size:12px;font-weight:500;text-align:right;white-space:nowrap;}
.reason-td{font-family:var(--fm);font-size:10px;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ls{display:inline-block;font-family:var(--fm);font-size:9px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px;border-radius:3px;white-space:nowrap;}
.ls-clean{background:var(--clean-bg);color:var(--clean);}.ls-auto_approved{background:var(--approved-bg);color:var(--approved);}.ls-needs_review{background:var(--review-bg);color:var(--review);}.ls-tp_refresh{background:var(--refresh-bg);color:var(--refresh);}
.po-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:22px;}
.po-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:border-color .15s;}
.po-card:hover{border-color:var(--border-light);}
.po-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.po-card-num{font-family:var(--fm);font-size:12px;font-weight:500;}
.po-card-city{font-size:11px;color:var(--muted);margin-bottom:8px;}
.po-card-pills{display:flex;gap:5px;flex-wrap:wrap;}
</style>
</head>

const PO_LIST = DATA.po_list;
const ALL_LINES = DATA.lines;
let decisions = {};
let activePO = null;
const SL = {clean:'Clean',auto_approved:'Auto-approved',needs_review:'Needs review',tp_refresh:'Refresh with platform'};

function buildNav(){
  const ob = document.getElementById('overview-btn');
  if(activePO){ ob.classList.remove('active'); } else { ob.classList.add('active'); }
  document.getElementById('po-nav').innerHTML = PO_LIST.map(p=>`
    <div class="po-item ${activePO===p.po?'active':''}" onclick="selectPO('${p.po}')">
      <div>
        <div class="po-num">${p.po}</div>
        <div class="po-sub">${p.city||''} · ${p.total} line${p.total>1?'s':''}</div>
      </div>
      <div class="dot ${p.overall}"></div>
    </div>`).join('');
}

function showOverview(){
  activePO = null;
  buildNav();
  const review   = PO_LIST.filter(p=>p.overall==='needs_review');
  const refresh  = PO_LIST.filter(p=>p.overall==='tp_refresh');
  const approved = PO_LIST.filter(p=>p.overall==='auto_approved');
  const clean    = PO_LIST.filter(p=>p.overall==='clean');
  function grid(list){
    return `<div class="po-grid">${list.map(p=>`
      <div class="po-card" onclick="selectPO('${p.po}')">
        <div class="po-card-top"><div class="po-card-num">${p.po}</div><div class="dot ${p.overall}"></div></div>
        <div class="po-card-city">${p.city||'—'} · ${p.total} line${p.total>1?'s':''}</div>
        <div class="po-card-pills">
          ${p.needs_review?`<span class="ls ls-needs_review">${p.needs_review} review</span>`:''}
          ${p.tp_refresh?`<span class="ls ls-tp_refresh">${p.tp_refresh} refresh</span>`:''}
          ${p.auto_approved?`<span class="ls ls-auto_approved">${p.auto_approved} approved</span>`:''}
          ${p.clean?`<span class="ls ls-clean">${p.clean} clean</span>`:''}
        </div>
      </div>`).join('')}</div>`;
  }
  let h='';
  if(review.length)  h+=`<div class="sec-hd"><div class="sec-title">Needs review</div><div class="sec-count">${review.length} POs</div></div>${grid(review)}`;
  if(refresh.length) h+=`<div class="sec-hd"><div class="sec-title">Refresh with platform</div><div class="sec-count">${refresh.length} POs</div></div>${grid(refresh)}`;
  if(approved.length)h+=`<div class="sec-hd"><div class="sec-title">Auto-approved</div><div class="sec-count">${approved.length} POs</div></div>${grid(approved)}`;
  if(clean.length)   h+=`<div class="sec-hd"><div class="sec-title">Clean</div><div class="sec-count">${clean.length} POs</div></div>${grid(clean)}`;
  document.getElementById('detail').innerHTML = h;
}

function selectPO(po){
  activePO = po;
  buildNav();
  renderDetail(PO_LIST.find(p=>p.po===po));
  document.querySelector('.content').scrollTop = 0;
}

function renderDetail(pd){
  const review   = pd.lines.filter(l=>l.status==='needs_review');
  const refresh  = pd.lines.filter(l=>l.status==='tp_refresh');
  const approved = pd.lines.filter(l=>l.status==='auto_approved');
  const clean    = pd.lines.filter(l=>l.status==='clean');
  let h=`<div class="po-hd">
    <div class="po-hd-num">${pd.po}</div>
    <div class="pill pill-${pd.overall}">${SL[pd.overall]}</div>
    ${pd.city?`<div style="font-family:var(--fm);font-size:12px;color:var(--muted);">${pd.city}</div>`:''}
    <div style="margin-left:auto;"><button class="tbtn" onclick="exportPO('${pd.po}')">↓ Export PO</button></div>
  </div>`;
  if(review.length){
    h+=`<div class="sec-hd"><div class="sec-title">Needs your decision</div><div class="sec-count">${review.length} line${review.length>1?'s':''}</div></div>`;
    review.forEach((l,i)=>{h+=reviewCard(l,pd.po+l.sku);});
    h+='<div style="margin-bottom:22px;"></div>';
  }
  if(refresh.length){
    h+=`<div class="sec-hd"><div class="sec-title">Refresh with platform</div><div class="sec-count">${refresh.length} line${refresh.length>1?'s':''}</div></div>`;
    h+=`<div class="tbl-wrap"><table>${thead()}${refresh.map(tableRow).join('')}</table></div>`;
  }
  if(approved.length){
    h+=`<div class="sec-hd"><div class="sec-title">Auto-approved — send to invoicing</div><div class="sec-count">${approved.length} line${approved.length>1?'s':''}</div></div>`;
    h+=`<div class="tbl-wrap"><table>${thead()}${approved.map(tableRow).join('')}</table></div>`;
  }
  if(clean.length){
    h+=`<div class="sec-hd"><div class="sec-title">Clean — send to invoicing</div><div class="sec-count">${clean.length} line${clean.length>1?'s':''}</div></div>`;
    h+=`<div class="tbl-wrap"><table>${thead()}${clean.map(tableRow).join('')}</table></div>`;
  }
  document.getElementById('detail').innerHTML = h;
  updateHeaderStats();
}

function reviewCard(l, key){
  const dec = decisions[key];
  const higher = Math.max(l.actual||0, l.po_tp||0);
  const syncStatus = dec ? (dec.sending?' · syncing…':dec.error?' · sync failed':dec.synced?' · synced':'') : '';
  return `<div class="card">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px;">
      <div>
        <div class="card-sku">${l.sku}</div>
        <div class="card-desc">${l.desc.substring(0,90)}</div>
      </div>
      ${l.escalated?`<div class="pill pill-tp_refresh">Escalated</div>`:''}
    </div>
    ${l.escalated?`<div class="esc-note">Qualifies for ₹1 rule individually — escalated because another line in this PO has a large discrepancy.</div>`:''}
    <div class="card-prices">
      <div class="pb"><label>Actual TP</label><div class="v v-actual">₹${(l.actual||0).toFixed(2)}</div></div>
      <div class="pb"><label>PO TP</label><div class="v v-popo">₹${(l.po_tp||0).toFixed(2)}</div></div>
      <div class="pb"><label>Diff</label><div class="v v-diffsm">₹${(l.diff||0).toFixed(2)}</div></div>
      ${dec&&dec.invoiceAt?`<div class="pb"><label>Invoice at</label><div class="v v-actual">₹${dec.invoiceAt.toFixed(2)}</div></div>`:''}
    </div>
    <div class="actions">
      ${dec
        ?`<button class="btn btn-done">✓ ${dec.label}${syncStatus}</button>`
        :`<button class="btn btn-approve" onclick="decide('${key}','approve',${higher},'Approved @ ₹${higher.toFixed(2)}')">Approve — invoice at ₹${higher.toFixed(2)}</button>
          <button class="btn btn-flag" onclick="decide('${key}','flag',null,'Flagged to platform')">Flag platform</button>
          <button class="btn btn-neutral" onclick="decide('${key}','refresh',null,'TP refresh')">TP refresh</button>`
      }
    </div>
  </div>`;
}

function thead(){
  return `<thead><tr><th>SKU</th><th>Description</th><th style="text-align:right">Actual TP</th><th style="text-align:right">PO TP</th><th style="text-align:right">Invoice at</th><th>Status</th><th>Reason</th></tr></thead>`;
}
function tableRow(l){
  const inv = l.invoice_at!=null?'₹'+l.invoice_at.toFixed(2):'—';
  const invColor = l.invoice_at!=null?'color:var(--clean)':'color:var(--muted)';
  return `<tr>
    <td class="sku-td" title="${l.sku}">${l.sku}</td>
    <td class="desc-td" title="${l.desc}">${l.desc.substring(0,55)}…</td>
    <td class="price-td">₹${(l.actual||0).toFixed(2)}</td>
    <td class="price-td">₹${(l.po_tp||0).toFixed(2)}</td>
    <td class="inv-td" style="${invColor}">${inv}</td>
    <td><span class="ls ls-${l.status}">${SL[l.status]}</span></td>
    <td class="reason-td" title="${l.reason}">${l.reason}</td>
  </tr>`;
}

function decide(key, action, invoiceAt, label){
  decisions[key] = {action, invoiceAt, label, sending: true};
  renderDetail(PO_LIST.find(p=>p.po===activePO));

  const line = ALL_LINES.find(l=>(l.po+l.sku)===key);
  if(!line) return;

  const url = APPS_SCRIPT_URL
    + '?action=' + encodeURIComponent(action)
    + '&po=' + encodeURIComponent(line.po)
    + '&sku=' + encodeURIComponent(line.sku)
    + '&approved_tp=' + encodeURIComponent(invoiceAt||'')
    + '&po_tp=' + encodeURIComponent(line.po_tp||'')
    + '&actual_tp=' + encodeURIComponent(line.actual||'');

  fetch(url, {method:'GET', mode:'no-cors'})
  .then(()=>{
    decisions[key].sending=false; decisions[key].synced=true;
    renderDetail(PO_LIST.find(p=>p.po===activePO));
  })
  .catch(err=>{
    console.error('Sync failed:',err);
    decisions[key].sending=false; decisions[key].error=true;
    renderDetail(PO_LIST.find(p=>p.po===activePO));
  });
}

function updateHeaderStats(){
  const pending = ALL_LINES.filter(l=>l.status==='needs_review'&&!decisions[l.po+l.sku]).length;
  document.getElementById('h-review').textContent = pending;
}

function csvRows(lines){
  const rows=[['PO #','SKU','Description','City','Actual TP','PO TP','Diff (₹)','Diff %','Status','Invoice at','Reason']];
  lines.forEach(l=>{
    const key=l.po+l.sku; const dec=decisions[key];
    let status=l.status, inv=l.invoice_at!=null?l.invoice_at.toFixed(2):'—';
    if(dec){status='decided:'+dec.action;if(dec.invoiceAt)inv=dec.invoiceAt.toFixed(2);}
    rows.push([l.po,l.sku,l.desc,l.city||'',(l.actual||0).toFixed(2),(l.po_tp||0).toFixed(2),(l.diff||0).toFixed(2),(l.pct||0).toFixed(2)+'%',status,inv,l.reason]);
  });
  return rows;
}
function dl(csv,name){const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download=name;a.click();}
function exportCSV(){dl(csvRows(ALL_LINES).map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`)
  .join(',')).join('\n'),'tp_decisions_May2026.csv');}
function exportPO(po){
  dl(csvRows(ALL_LINES.filter(l=>l.po===po)).map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`)
  .join(',')).join('\n'),`tp_${po}.csv`);
}

showOverview();
</script>
